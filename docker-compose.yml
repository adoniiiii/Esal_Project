services:
  db:
    image: postgres:16
    container_name: es_al
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: es_al
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  frontend:
    build: ./frontend
    container_name: es_al_frontend
    restart: always
    ports:
      - "5173:5173"

volumes:
  postgres_data: